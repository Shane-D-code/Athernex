version: '3.8'

services:
  # Whisper STT Service
  whisper-stt:
    image: fedirz/faster-whisper-server:latest-cuda
    container_name: whisper-stt
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=medium
      - DEVICE=cuda
      - COMPUTE_TYPE=float16
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./models/whisper:/root/.cache/huggingface
    restart: unless-stopped

  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-llm
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./models/ollama:/root/.ollama
    restart: unless-stopped
    command: serve

  # Piper TTS Service
  piper-tts:
    build:
      context: ./docker/piper
      dockerfile: Dockerfile
    container_name: piper-tts
    ports:
      - "8002:8002"
    volumes:
      - ./models/piper:/models
    restart: unless-stopped

  # Main Application
  voice-order-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voice-order-app
    ports:
      - "8080:8080"
    environment:
      - WHISPER_ENDPOINT=http://whisper-stt:8000
      - OLLAMA_ENDPOINT=http://ollama:11434
      - PIPER_ENDPOINT=http://piper-tts:8002
    depends_on:
      - whisper-stt
      - ollama
      - piper-tts
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env
    restart: unless-stopped

networks:
  default:
    name: voice-order-network
